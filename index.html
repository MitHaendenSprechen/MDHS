<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DANKE</title>

    <link rel="stylesheet" href="https://use.typekit.net/xwt6ozx.css">

    <style>
        /* Basis-Styling für Mobile First */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Crayonize', sans-serif;
            background-color: #ffffff;
            color: #333333;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Macht Header- und Footer-Bilder automatisch responsive */
        header img, footer img {
            width: 100%;
            height: auto;
            display: block;
        }

        main {
            flex: 1;
            padding: 20px;
            text-align: center;
        }

        h1 {
            font-size: 5rem;
            margin-bottom: 10px;
        }

        /* Container für das responsive Video */
        .video-container {
            width: 100%;
            max-width: 500px; 
            margin: 0 auto;
        }
        
        video {
            width: 100%;
            height: auto;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <header>
        <img src="header.png" alt="Kopfzeile">
    </header>

    <main>
        <h1>Danke</h1>
    

<iframe
  src="https://player.cloudinary.com/embed/?cloud_name=de3kjqa5o&public_id=IMG_1177_a4sz0c"
  width="640"
  height="360" 
  style="height: auto; width: 100%; aspect-ratio: 640 / 360;"
  allow="autoplay; fullscreen; encrypted-media; picture-in-picture"
  allowfullscreen
  frameborder="0"
></iframe>

    </main>

    <footer>
        <img src="footer.png" alt="Fußzeile">
    </footer>

</body>
</html>
