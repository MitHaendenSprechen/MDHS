<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DANKE</title>

    <link rel="stylesheet" href="https://use.typekit.net/xwt6ozx.css">

    <style>
        /* Sichert ab, dass es KEINE Ränder gibt und nichts scrollt */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh; /* Die Seite ist exakt so hoch wie der Bildschirm */
            overflow: hidden; /* Schaltet das Scrollen komplett ab */
            font-family: 'Crayonize', sans-serif;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
        }

        /* Der Header geht bis ganz an den Rand */
        header {
            position: relative;
            width: 100%;
            margin: 0;
            flex-shrink: 0; 
        }

        header img {
            width: 100%;
            display: block; 
        }

        /* Das "Danke" perfekt über dem Header-Bild zentriert */
        h1 {
            position: absolute;
            top: 40%; 
            left: 50%;
            transform: translate(-50%, -50%);
            margin: 0;
            color: #ffffff; 
            font-size: clamp(3rem, 15vw, 6rem); 
            text-align: center;
        }

        /* Hauptbereich mit Abstand zum Rand */
        main {
            flex: 1; 
            display: flex;
            justify-content: center; 
            align-items: flex-start; 
            width: 100%;
            /* HIER IST DER NEUE RAND: 15px oben, 20px rechts, 30px unten (für die iOS-Balken), 20px links */
            padding: 15px 20px 30px 20px; 
            box-sizing: border-box;
        }

        /* Video Container und Video selbst */
        .video-container {
            width: 100%;
            max-width: 500px;
            height: 100%; 
            display: flex;
            justify-content: center;
            align-items: flex-start; 
        }

        video {
            width: 100%;
            max-height: 100%; /* Durch das Padding im main-Bereich darf das Video hier jetzt auf 100% stehen */
            object-fit: contain; 
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <header>
        <img src="Header 2.png" alt="Kopfzeile">
        <h1>Danke</h1>
    </header>

    <main>
        <div class="video-container">
            <video controls playsinline>
                <source src="https://res.cloudinary.com/dxdxby61x/video/upload/q_auto/f_auto/v1780046903/IMG_1177_ddydry.mp4" type="video/mp4">
                Dein Browser unterstützt das Video leider nicht.
            </video>
        </div>
    </main>

</body>
</html>
