<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DANKE</title>

    <link rel="stylesheet" href="https://use.typekit.net/xwt6ozx.css">

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100vh; 
            font-family: 'Crayonize', sans-serif;
            background-color: #487fb0; 
            display: flex;
            flex-direction: column;
        }

        header {
            position: relative;
            width: 100%;
            margin: 0;
            flex-shrink: 0; 
        }

        header img {
            width: 100%;
            display: block; 
        }

        h1 {
            position: absolute;
            top: 40%; 
            left: 50%;
            transform: translate(-50%, -50%);
            margin: 0;
            color: #ffffff; 
            font-size: clamp(3rem, 15vw, 6rem); 
            text-align: center;
        }

        main {
            flex: 1; 
            display: flex;
            justify-content: center; 
            align-items: flex-start; 
            width: 100%;
            padding: 15px 20px 30px 20px; 
            box-sizing: border-box;
            background-color: #ffffff; 
        }

        .video-container {
            width: 100%;
            max-width: 500px;
            display: flex;
            justify-content: center;
            align-items: flex-start; 
        }

        video {
            width: 100%;
            max-height: 70vh; 
            object-fit: contain; 
            border-radius: 8px;
            cursor: pointer; 
            /* Verhindert, dass das Video beim Antippen auf dem Handy kurz grau aufblinkt */
            -webkit-tap-highlight-color: transparent; 
        }
    </style>
</head>
<body>

    <header>
        <img src="Header 2.png" alt="Kopfzeile">
        <h1>Danke</h1>
    </header>

    <main>
        <div class="video-container">
            <video id="myVideo" autoplay loop muted playsinline>
                <source src="https://res.cloudinary.com/dxdxby61x/video/upload/q_auto/f_auto/v1780046903/IMG_1177_ddydry.mp4" type="video/mp4">
                Dein Browser unterstützt das Video leider nicht.
            </video>
        </div>
    </main>

    <script>
        const video = document.getElementById('myVideo');
        
        video.addEventListener('click', function() {
            // Falls das Video auf dem Handy wegen Stromsparmodus gar nicht erst gestartet ist, starten wir es jetzt:
            if (video.paused) {
                video.play();
            }
            
            // Schalte den Ton bei jedem Tippen abwechselnd an und aus
            video.muted = !video.muted;
        });
    </script>

</body>
</html>
